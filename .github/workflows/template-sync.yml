name: template-sync

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  template-sync:
    timeout-minutes: 20
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: ahmadnassri/action-template-repository-sync@v2
        with:
          github-token: ${{ secrets.SYNC_TOKEN }}
          config: .github/template-sync.yml
          dry-run: true
          skip-ci: true
